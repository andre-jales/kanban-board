<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Organizaí</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css">
  </head>
  <body --bs-body-bg>
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
              <a class="navbar-brand text-white" href="index.html">Organizaí</a>
              <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
              </button>
              <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav">
                  <a class="nav-link active text-white" aria-current="page" href="index.html">Home</a>
                  <a class="nav-link text-white" href="links.html">URLs interessantes</a>
                </div>
              </div>
            </div>  
        </nav>
    </header>

    <div class="container mt-4" id="kanban">
        <div class="row linha-kanban">
            <div class="col-md-4 coluna-kanban card">
                <div class="card-header text-white border-top border-bottom-0 border-5 border-warning border-opacity-75 colummn-header">
                    A Fazer
                    <button type="button" class="btn btn-secondary btn-sm float-end">+</button>
                </div>
                <div class="card-body status" id="to-do">
                
                </div>
            </div>
            <div class="col-md-4 coluna-kanban card">
                <div class="card-header text-white border-top border-bottom-0 border-5 border-primary border-opacity-75 colummn-header">
                    Em Andamento
                    <button type="button" class="btn btn-secondary btn-sm float-end">+</button>
                </div>
                <div class="card-body status doing" id="doing">
                        
                </div>
            </div>
            <div class="col-md-4 coluna-kanban card">
                <div class="card-header text-white border-top border-bottom-0 border-5 border-success border-opacity-75 colummn-header">
                    Concluído
                    <button type="button" id="btn" class="btn btn-secondary btn-sm float-end">+</button>
                </div>
                <div class="card-body status" id="done">
                    
                </div>
            </div>
        </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
    <script src="https://SortableJS.github.io/Sortable/Sortable.js"></script>
    <script src="script.js"></script>
  </body>
</html>
